<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Icon art: large certificate (document + seal) -->
  <g transform="translate(530, 100)">
    <rect x="0" y="0" width="140" height="180" rx="8" fill="none" stroke="#E87D0D" stroke-width="4"/>
    <path d="M30 50h80M30 80h55" stroke="#E87D0D" stroke-width="4" stroke-linecap="round"/>
    <circle cx="110" cy="140" r="28" fill="#E87D0D" opacity="0.7"/>
    <circle cx="110" cy="140" r="14" fill="#2D2D2D"/>
  </g>

  <!-- Title -->
  <text x="600" y="390" text-anchor="middle"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="72" font-weight="600" fill="#e6e6e6"
        letter-spacing="2">Certificate Generator</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="24" fill="#888"
        letter-spacing="1">Design templates, import CSV, generate bulk PDFs</text>

  <!-- Tech badges -->
  <g transform="translate(370, 480)">
    <rect x="0" y="0" width="80" height="28" rx="6" fill="#E87D0D" opacity="0.15"/>
    <text x="40" y="19" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="500"
          fill="#E87D0D">Go</text>

    <rect x="100" y="0" width="90" height="28" rx="6" fill="#e6a817" opacity="0.15"/>
    <text x="145" y="19" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="500"
          fill="#e6a817">Svelte 5</text>

    <rect x="210" y="0" width="70" height="28" rx="6" fill="#4b76c2" opacity="0.15"/>
    <text x="245" y="19" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="500"
          fill="#4b76c2">PDF</text>

    <rect x="300" y="0" width="100" height="28" rx="6" fill="#27ae60" opacity="0.15"/>
    <text x="350" y="19" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="500"
          fill="#27ae60">Drag &amp; Drop</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="#E87D0D" opacity="0.8"/>
</svg>
